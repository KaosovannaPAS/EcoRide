<script>
    // Logic to show/hide login/logout based on localStorage
    setTimeout(() => {
        const user = JSON.parse(localStorage.getItem('ecoride_user') || 'null');
        const loginBtn = document.getElementById('nav-login');
        const espacePerso = document.getElementById('nav-espace-perso');
        const creditsNav = document.getElementById('nav-credits');
        const creditBalance = document.getElementById('header-credit-balance');

        if (user) {
            loginBtn.textContent = "Déconnexion";
            loginBtn.href = "#";
            loginBtn.classList.remove('btn-eco');
            loginBtn.classList.add('btn-outline-danger');
            loginBtn.classList.add('btn');

            loginBtn.onclick = (e) => {
                e.preventDefault();
                localStorage.removeItem('ecoride_user');
                window.location.reload();
            };

            if (espacePerso) {
                espacePerso.style.display = "block";
            }
            if (creditsNav && creditBalance) {
                creditsNav.style.display = "block";
                creditBalance.textContent = user.credits || 0;
            }
        }
    }, 100); // Small delay to allow DOM to attach if loaded dynamically
</script>
