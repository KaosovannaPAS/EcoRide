<script>
    // Logic to show/hide login/logout based on localStorage
    setTimeout(() => {
        const user = JSON.parse(localStorage.getItem('ecoride_user') || 'null');
        const loginBtn = document.getElementById('nav-login');
        const espacePerso = document.getElementById('nav-espace-perso');

        if (user) {
            loginBtn.textContent = "Déconnexion";
            loginBtn.href = "#";
            loginBtn.classList.remove('btn-outline-light');
            loginBtn.classList.add('btn-danger');

            loginBtn.onclick = (e) => {
                e.preventDefault();
                localStorage.removeItem('ecoride_user');
                window.location.reload();
            };

            if (espacePerso) {
                espacePerso.style.display = "block";
            }
        }
    }, 100); // Small delay to allow DOM to attach if loaded dynamically
</script>
