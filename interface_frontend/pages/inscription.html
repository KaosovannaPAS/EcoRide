<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div id="header-container"></div>

    <main class="container-fluid flex-grow-1 d-flex p-0" style="min-height: calc(100vh - 76px);">
        <div class="row g-0 w-100">
            <div class="col-md-6 d-flex align-items-center justify-content-center p-5 bg-white">
                <div style="width: 100%; max-width: 450px;">
                    <h2 class="mb-2 fw-bold" style="color: var(--eco-primary);">Rejoignez la communauté</h2>
                    <p class="text-muted mb-5">Inscrivez-vous et recevez <strong class="text-success">20 crédits
                            offerts</strong>.</p>
                    <form id="register-form">
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Pseudo</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="pseudo"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Email</label>
                            <input type="email" class="form-control form-control-lg bg-light border-0" id="email"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Mot de passe</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="password"
                                required>
                        </div>
                        <button type="submit"
                            class="btn btn-eco-accent w-100 py-3 rounded-pill fw-bold fs-5 mt-3 shadow-sm">Créer mon
                            compte</button>
                    </form>
                    <div class="text-center mt-5">
                        <p class="mb-0 text-muted">Déjà un compte ? <a href="connexion.html" class="fw-bold"
                                style="color: var(--eco-primary);">Se connecter</a></p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 d-none d-md-block">
                <div class="h-100 w-100"
                    style="background-image: url('../ressources/images/login_side_image_1772537112547.png'); background-size: cover; background-position: center; transform: scaleX(-1);">
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

            try {
                const res = await apiCall('users.php?action=register', 'POST', {
                    pseudo: document.getElementById('pseudo').value,
                    email: document.getElementById('email').value,
                    mot_de_passe: document.getElementById('password').value
                });
                alert(res.message);
                window.location.href = 'connexion.html';
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.textContent = "S'inscrire";
            }
        });
    </script>
</body>

</html>
