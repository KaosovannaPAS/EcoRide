<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Personnel - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div id="header-container"></div>

    <main class="container my-5 flex-grow-1">
        <div class="row">
            <div class="col-md-3">
                <div class="card p-4 mb-4 shadow-sm text-center border-0 rounded-4"
                    style="background-color: var(--eco-surface);">
                    <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center mx-auto mb-3 fs-2 fw-bold"
                        style="width: 80px; height: 80px;" id="user-avatar-initial">
                        ?
                    </div>
                    <h4 class="fw-bold fs-4" id="user-pseudo">...</h4>
                    <p class="text-muted mb-3" id="user-role">...</p>
                    <div class="p-3 rounded-4" style="background-color: #f0fdf4; border: 1px solid #bbf7d0;">
                        <h2 class="text-success mb-0 fw-bold" id="user-credits">...</h2>
                        <p class="small text-muted mb-0 fw-bold">Crédits disponibles</p>
                    </div>
                </div>

                <div class="list-group shadow-sm rounded-4 border-0">
                    <button class="list-group-item list-group-item-action active fw-bold border-0 py-3"
                        data-bs-toggle="list" data-bs-target="#vehicules" type="button"
                        style="border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;">🚗 Mes
                        Véhicules</button>
                    <button class="list-group-item list-group-item-action fw-bold border-0 py-3" data-bs-toggle="list"
                        data-bs-target="#publier" type="button"
                        style="border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg);">➕ Publier un
                        trajet</button>
                    <!-- Admin Dashboard Link injected here if role=admin/employe -->
                    <div id="admin-links"></div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="tab-content" id="nav-tabContent">
                    <!-- Véhicules Tab -->
                    <div class="tab-pane fade show active" id="vehicules">
                        <div class="card p-5 shadow-sm border-0 rounded-4">
                            <h3 class="fw-bold mb-4" style="color: var(--eco-primary);">Mes Véhicules</h3>
                            <div id="vehicles-list" class="row mb-5 g-4">
                                <!-- Loaded via JS -->
                            </div>

                            <hr style="opacity: 0.1;">

                            <h5 class="fw-bold mt-4 mb-3">Ajouter un véhicule</h5>
                            <form id="add-vehicle-form" class="row g-3 bg-light p-4 rounded-4 border-0">
                                <div class="col-md-4">
                                    <input type="text" class="form-control form-control-lg bg-white border-0"
                                        id="v-immat" placeholder="Immatriculation" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="text" class="form-control form-control-lg bg-white border-0"
                                        id="v-model" placeholder="Modèle" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="text" class="form-control form-control-lg bg-white border-0"
                                        id="v-color" placeholder="Couleur" required>
                                </div>
                                <div class="col-12 mt-3 d-flex align-items-center">
                                    <div class="form-check me-auto">
                                        <input class="form-check-input fs-5" type="checkbox" id="v-eco"
                                            style="cursor: pointer;">
                                        <label class="form-check-label text-success fw-bold ms-2 pt-1" for="v-eco"
                                            style="cursor: pointer;">
                                            Véhicule Électrique (Covoiturage Écologique)
                                        </label>
                                    </div>
                                    <button type="submit"
                                        class="btn btn-eco-accent rounded-pill px-5 py-2">Ajouter</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Publier Tab -->
                    <div class="tab-pane fade" id="publier">
                        <div class="card p-5 shadow-sm border-0 rounded-4">
                            <h3 class="fw-bold mb-2 text-success">Publier un trajet</h3>
                            <p class="text-muted mb-4 pb-3 border-bottom"><strong>Attention :</strong> 2 crédits seront
                                déduits de votre
                                compte lors de la publication.</p>

                            <form id="publish-trip-form" class="row g-4 bg-light p-4 rounded-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Véhicule
                                        Utilisé</label>
                                    <select class="form-select form-select-lg border-0 bg-white" id="t-vehicule"
                                        required>
                                        <option value="">Sélectionner un véhicule</option>
                                    </select>
                                </div>
                                <div class="col-md-6"></div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Ville de
                                        départ</label>
                                    <input type="text" class="form-control form-control-lg border-0 bg-white"
                                        id="t-depart" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Ville
                                        d'arrivée</label>
                                    <input type="text" class="form-control form-control-lg border-0 bg-white"
                                        id="t-arrivee" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Date du
                                        trajet</label>
                                    <input type="date" class="form-control form-control-lg border-0 bg-white"
                                        id="t-date" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Heure de
                                        départ</label>
                                    <input type="time" class="form-control form-control-lg border-0 bg-white"
                                        id="t-heure" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Prix
                                        (Crédits)</label>
                                    <input type="number" class="form-control form-control-lg border-0 bg-white"
                                        id="t-prix" min="1" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Durée
                                        (Minutes)</label>
                                    <input type="number" class="form-control form-control-lg border-0 bg-white"
                                        id="t-duree" min="10" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-muted small text-uppercase">Places
                                        Dispo.</label>
                                    <input type="number" class="form-control form-control-lg border-0 bg-white"
                                        id="t-places" min="1" required>
                                </div>
                                <div class="col-12 text-end mt-5">
                                    <button type="submit"
                                        class="btn btn-eco btn-lg px-5 rounded-pill shadow-sm fw-bold">🚀 Publier mon
                                        trajet (-2 Crédits)</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        const user = JSON.parse(localStorage.getItem('ecoride_user'));
        if (!user) {
            window.location.href = 'connexion.html';
        }

        document.getElementById('user-pseudo').textContent = user.pseudo;
        document.getElementById('user-role').textContent = "Rôle : " + user.role;
        document.getElementById('user-credits').textContent = user.credits;

        if (user.role === 'admin' || user.role === 'employe') {
            document.getElementById('admin-links').innerHTML = `
                <a href="admin.html" class="list-group-item list-group-item-action fw-bold text-danger border-start border-4 border-danger">Espace Admin/Employé</a>
            `;
        }

        async function loadVehicles() {
            try {
                const vehicles = await apiCall(`vehicles.php?action=list&user_id=${user.id}`);

                // Render List
                const list = document.getElementById('vehicles-list');
                const select = document.getElementById('t-vehicule');
                select.innerHTML = '<option value="">Sélectionner un véhicule</option>';

                if (vehicles.length === 0) {
                    list.innerHTML = '<div class="col-12"><p class="text-muted">Aucun véhicule enregistré.</p></div>';
                    return;
                }

                list.innerHTML = vehicles.map(v => {
                    select.innerHTML += `<option value="${v.id}">${v.model} (${v.registration})</option>`;
                    let badge = v.is_electric == 1 ? '<span class="eco-badge">🍃 Électrique</span>' : '';
                    return `
                        <div class="col-md-6 mb-3">
                            <div class="p-3 border rounded">
                                <strong>${v.model}</strong> ${badge}<br>
                                <small class="text-muted">${v.registration} • ${v.color}</small>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('add-vehicle-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiCall('vehicles.php?action=create', 'POST', {
                    user_id: user.id,
                    registration: document.getElementById('v-immat').value,
                    model: document.getElementById('v-model').value,
                    color: document.getElementById('v-color').value,
                    is_electric: document.getElementById('v-eco').checked
                });
                alert("Véhicule ajouté !");
                document.getElementById('add-vehicle-form').reset();
                loadVehicles();
            } catch (error) {
                alert(error.message);
            }
        });

        document.getElementById('publish-trip-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (user.credits < 2) {
                alert("Crédits insuffisants. Il vous faut au moins 2 crédits pour publier un trajet.");
                return;
            }
            try {
                const res = await apiCall('trips.php?action=create', 'POST', {
                    driver_id: user.id,
                    vehicle_id: document.getElementById('t-vehicule').value,
                    departure_city: document.getElementById('t-depart').value,
                    destination_city: document.getElementById('t-arrivee').value,
                    departure_date: document.getElementById('t-date').value,
                    departure_time: document.getElementById('t-heure').value,
                    price: document.getElementById('t-prix').value,
                    max_duration: document.getElementById('t-duree').value,
                    max_seats: document.getElementById('t-places').value
                });
                alert(res.message);

                // Deduct locally 2 credits to keep UI in sync without immediate fetch User endpoint
                user.credits -= 2;
                localStorage.setItem('ecoride_user', JSON.stringify(user));
                document.getElementById('user-credits').textContent = user.credits;

                document.getElementById('publish-trip-form').reset();
            } catch (error) {
                alert(error.message);
            }
        });

        document.addEventListener('DOMContentLoaded', loadVehicles);
    </script>
</body>

</html>
