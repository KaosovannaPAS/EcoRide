<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de Trajets - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body>

    <div id="header-container"></div>

    <main class="container my-5 flex-grow-1">
        <div class="row align-items-center mb-5 bg-white rounded-4 shadow-sm overflow-hidden"
            style="border: 1px solid rgba(0,0,0,0.05);">
            <div class="col-md-8 p-5">
                <h2 class="fw-bold mb-3" style="color: var(--eco-primary);">Résultats de la recherche</h2>
                <div class="d-flex align-items-center mb-0">
                    <p class="text-muted fs-5 mb-0 me-4">Trouvez le trajet idéal parmi les conducteurs de notre
                        communauté.</p>
                    <div class="badge bg-eco-accent rounded-pill px-3 py-2 pulse-animation">🎁 Bonus : Gagnez des
                        crédits en partageant vos trajets !</div>
                </div>
            </div>
            <div class="col-md-4 d-none d-md-block p-0 h-100">
                <div
                    style="height: 160px; background-image: url('../ressources/images/search_illustration_1772537248666.png'); background-size: cover; background-position: center; border-left: 1px solid rgba(0,0,0,0.05);">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="card p-3 mb-4 sticky-top" style="top: 80px;">
                    <h5>Filtres</h5>
                    <form id="filter-form">
                        <div class="mb-3">
                            <label class="form-label">Prix maximum (€/crédits)</label>
                            <input type="range" class="form-range" id="filter-price" min="0" max="100" value="100"
                                oninput="priceOutput.value = this.value">
                            <div class="text-end fw-bold"><output id="priceOutput">100</output></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Durée maximale (minutes)</label>
                            <input type="range" class="form-range" id="filter-duration" min="0" max="600" value="600"
                                step="30" oninput="durationOutput.value = this.value">
                            <div class="text-end fw-bold"><output id="durationOutput">600</output></div>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="filter-eco">
                            <label class="form-check-label text-success fw-bold" for="filter-eco">
                                🍃 Voyage Écologique (<span class="eco-badge">EV</span>)
                            </label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="filter-bonplan">
                            <label class="form-check-label text-warning fw-bold" for="filter-bonplan">
                                🔥 Bon Plan du moment
                            </label>
                        </div>
                        <button type="button" class="btn btn-eco w-100" onclick="applyFilters()">Appliquer les
                            filtres</button>
                    </form>
                </div>
            </div>

            <div class="col-md-9">
                <div id="results-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        const urlParams = new URLSearchParams(window.location.search);
        let departure = urlParams.get('departure_city') || '';
        let destination = urlParams.get('destination_city') || '';
        let date = urlParams.get('departure_date') || '';
        let allTrips = [];

        async function loadTrips() {
            try {
                let query = `action=search&departure_city=${departure}&destination_city=${destination}&departure_date=${date}`;
                allTrips = await apiCall(`trips.php?${query}`);
                renderTrips(allTrips);
            } catch (error) {
                document.getElementById('results-container').innerHTML = '<div class="alert alert-danger">Impossible de charger les trajets.</div>';
            }
        }

        function renderTrips(trips) {
            const container = document.getElementById('results-container');
            if (trips.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center py-5">
                        <h4 class="fw-bold">Aucun trajet trouvé</h4>
                        <p class="mb-0">Désolé, nous n'avons trouvé aucun trajet correspondant à vos critères pour le moment.</p>
                        <a href="index.html" class="btn btn-outline-success rounded-pill mt-3">Retour à l'accueil</a>
                    </div>`;
                return;
            }

            let html = trips.map(t => {
                let ecoBadge = t.is_electric == 1 ? '<span class="badge bg-eco-accent rounded-pill ms-2" style="font-size: 0.7rem;">🍃 ÉCOLOGIQUE</span>' : '';
                let isBonPlan = t.price <= 20;
                let dealBadge = isBonPlan ? '<div class="bon-plan-badge" style="top:10px; right:10px; font-size:0.6rem; padding:3px 10px;">🔥 BON PLAN</div>' : '';

                const oldPrice = Math.round(t.price * 1.5);
                const savings = oldPrice - t.price;

                return `
                    <a href="detail.html?id=${t.id}" class="text-decoration-none text-dark">
                        <div class="card mb-4 p-4 border-0 shadow-sm rounded-4 overflow-hidden position-relative bon-plan-card">
                            ${dealBadge}
                            ${isBonPlan ? `<div class="savings-badge" style="bottom: 20px; right: 150px; font-size:0.6rem;">-${savings} Crédits !</div>` : ''}
                            <div class="row align-items-center">
                                <div class="col-md-9">
                                    <div class="d-flex align-items-center mb-3">
                                        <h4 class="fw-bold mb-0">${t.departure_date}</h4>
                                        ${ecoBadge}
                                    </div>
                                    <div class="d-flex align-items-stretch mb-2">
                                        <div class="d-flex flex-column align-items-center justify-content-between me-4" style="min-width: 80px;">
                                            <div class="fw-bold text-dark fs-5">${t.departure_time}</div>
                                            <div class="vr my-1 border-2 text-muted" style="height: 40px; opacity: 0.2;"></div>
                                            <div class="fw-bold text-muted small mt-1">${t.max_duration} min</div>
                                        </div>
                                        <div class="d-flex flex-column justify-content-between">
                                            <div class="fs-5 fw-bold text-dark" style="letter-spacing: -0.5px;">${t.departure_city}</div>
                                            <div class="fs-5 fw-bold text-dark mt-auto" style="letter-spacing: -0.5px;">${t.destination_city}</div>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-4 pt-3 border-top d-flex align-items-center">
                                        <div class="rounded-circle d-flex align-items-center justify-content-center me-2 text-white fw-bold shadow-sm" 
                                             style="width: 36px; height: 36px; background: var(--eco-primary);">
                                            ${t.driver_pseudo ? t.driver_pseudo.charAt(0).toUpperCase() : '?'}
                                        </div>
                                        <div>
                                            <p class="fw-bold mb-0 text-dark small">${t.driver_pseudo || 'Conducteur inconnu'}</p>
                                            <div class="text-warning" style="font-size: 0.7rem;">⭐⭐⭐⭐⭐</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-3 text-md-end mt-4 mt-md-0 border-start ps-md-4">
                                    <div class="p-3 rounded-4 bg-light d-inline-block d-md-block text-center border mb-3">
                                        ${isBonPlan ? `<div class="text-danger small text-decoration-line-through fw-bold">${oldPrice}</div>` : ''}
                                        <div class="fw-bold text-success mb-0" style="font-size: 1.5rem;">${t.price}</div>
                                        <div class="text-muted small fw-bold" style="font-size: 0.65rem; letter-spacing: 1px;">CRÉDITS</div>
                                    </div>
                                    <button class="btn btn-eco-accent rounded-pill w-100 py-2 fw-bold shadow-sm pulse-animation">Réserver</button>
                                </div>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
            container.innerHTML = html;
        }

        function applyFilters() {
            let maxPrice = document.getElementById('filter-price').value;
            let maxDuration = document.getElementById('filter-duration').value;
            let onlyEco = document.getElementById('filter-eco').checked;
            let bundleBonPlan = document.getElementById('filter-bonplan').checked;

            let filtered = allTrips.filter(t => {
                let match = true;
                if (parseFloat(t.price) > parseFloat(maxPrice)) match = false;
                if (parseFloat(t.max_duration) > parseFloat(maxDuration)) match = false;
                if (onlyEco && t.is_electric != 1) match = false;

                // Bon Plan logic: Strictly price <= 20 as requested
                if (bundleBonPlan && t.price > 20) match = false;

                return match;
            });
            renderTrips(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadTrips);
    </script>
</body>

</html>
