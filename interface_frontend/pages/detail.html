<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Trajet - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body>

    <div id="header-container"></div>

    <main class="container my-5 flex-grow-1" id="detail-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success"></div>
        </div>
    </main>

    <!-- Double Confirmation Modal -->
    <div class="modal fade" id="reservationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 bg-light rounded-top-4">
                    <h5 class="modal-title fw-bold text-success">Confirmer la réservation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div class="display-1 mb-3">🎫</div>
                    <h4 class="fw-bold mb-3">Voulez-vous vraiment réserver ?</h4>
                    <p class="text-muted mb-0">Cette action déduira <strong><span id="modal-price"></span>
                            Crédits</strong> de votre portefeuille virtuel.</p>
                </div>
                <div class="modal-footer border-0 d-flex justify-content-center pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4"
                        data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-eco-accent rounded-pill px-4 fw-bold"
                        onclick="processReservation()">Confirmer et Payer</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        const urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('id');

        async function loadTripDetail() {
            try {
                let trips = await apiCall(`trips.php?action=search`);
                let t = trips.find(tr => tr.id == tripId);

                if (!t) throw new Error("Trajet non trouvé");

                let ecoBadge = t.est_electrique == 1 ? '<span class="eco-badge">🍃 Écologique</span>' : '';

                // Driver Photo Logic pour la page détail
                let driverPhotoHtml = '';
                if (t.conducteur_photo && t.conducteur_photo !== 'generic.png' && t.conducteur_photo !== '') {
                    driverPhotoHtml = `<img src="../ressources/images/${t.conducteur_photo}" alt="${t.conducteur_pseudo}" class="rounded-circle object-fit-cover me-3 border border-2 border-success shadow-sm" style="width: 56px; height: 56px;">`;
                } else {
                    const initial = t.conducteur_pseudo ? t.conducteur_pseudo.charAt(0).toUpperCase() : '?';
                    driverPhotoHtml = `<div class="rounded-circle d-flex align-items-center justify-content-center me-3 text-white bg-eco border border-2 border-success shadow-sm fw-bold" style="width: 56px; height: 56px; font-size: 1.5rem;">${initial}</div>`;
                }

                let html = `
                    <div class="card p-0 mx-auto rounded-4 border-0 shadow-sm overflow-hidden" style="max-width: 800px;">
                        <div style="height: 200px; background-image: url('../ressources/images/trip_detail_map_1772537269403.png'); background-size: cover; background-position: center; border-bottom: 1px solid rgba(0,0,0,0.05);"></div>
                        
                        <div class="p-5">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h2 class="mb-0 fw-bold text-dark">${t.ville_depart} <span class="text-muted">➔</span> ${t.ville_arrivee}</h2>
                                ${ecoBadge}
                            </div>
                        
                        <div class="row g-4 mb-5">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <div class="p-4 bg-white rounded-4 border h-100" style="background-color: var(--eco-bg) !important;">
                                    <h5 class="fw-bold text-primary mb-4" style="color: var(--eco-primary) !important;">Le Trajet</h5>
                                    <div class="d-flex mb-3">
                                        <div class="me-3 text-muted">📅</div>
                                        <div><strong>${t.date_depart}</strong> à <strong>${t.heure_depart}</strong></div>
                                    </div>
                                    <div class="d-flex mb-3">
                                        <div class="me-3 text-muted">⏱️</div>
                                        <div>Durée estimée : <strong>${t.duree_max} min</strong></div>
                                    </div>
                                    <div class="d-flex">
                                        <div class="me-3 text-muted">👥</div>
                                        <div>Places restantes : <strong>${t.places_max}</strong></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-4 bg-white rounded-4 border h-100" style="background-color: var(--eco-bg) !important;">
                                    <h5 class="fw-bold text-primary mb-4" style="color: var(--eco-primary) !important;">Le Chauffeur</h5>
                                    <div class="d-flex align-items-center mb-3">
                                        ${driverPhotoHtml}
                                        <div>
                                            <a href="profil.html?id=${t.conducteur_id}" class="fw-bold fs-5 text-decoration-none" style="color:var(--eco-primary);">${t.conducteur_pseudo}</a>
                                            <div class="text-muted small">Membre vérifié ✅</div>
                                        </div>
                                    </div>
                                    <div class="d-flex align-items-center border-top pt-3 mt-3">
                                        <div class="me-3 text-muted">🚗</div>
                                        <div class="fw-bold">${t.vehicule_modele}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-4 rounded-4 shadow-sm border overflow-hidden position-relative bg-white" style="border-color: #bbf7d0 !important;">
                            <!-- Background Decoration -->
                            <div class="position-absolute" style="top: -20px; left: -20px; font-size: 8rem; opacity: 0.05; transform: rotate(-15deg); pointer-events: none;">🍃</div>
                            <div class="position-absolute" style="bottom: -20px; right: -20px; font-size: 8rem; opacity: 0.05; transform: rotate(15deg); pointer-events: none;">🪙</div>
                            
                            <div class="row align-items-center position-relative">
                                <div class="col-md-7">
                                    <div class="badge bg-eco-accent rounded-pill mb-2 px-3">Contribution Éco-Solidaire</div>
                                    <div class="text-muted small mb-1 fw-bold">PRIX DU TRAJET</div>
                                    <div class="d-flex align-items-baseline flex-wrap">
                                        <h1 class="display-3 fw-black mb-0 text-dark credit-glow" style="letter-spacing: -2px;">${t.prix}</h1>
                                        <span class="ms-2 fs-3 fw-bold text-muted me-3">Crédits</span>
                                        ${t.prix <= 20 ? `
                                            <div class="d-inline-flex flex-column align-items-start border-start ps-3 ms-1" style="border-left: 2px solid #dee2e6 !important;">
                                                <span class="text-danger fw-bold text-decoration-line-through small" style="opacity:0.6;">${Math.round(t.prix * 1.5)} Crédits</span>
                                                <span class="badge bg-danger rounded-pill fw-bold" style="font-size: 0.7rem;">ÉCONOMIE: -${Math.round(t.prix * 0.5)} 🪙</span>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                                <div class="col-md-5 text-md-end mt-4 mt-md-0">
                                    <button class="btn btn-eco btn-lg px-5 py-3 rounded-pill fw-bold shadow-sm pulse-animation w-100" 
                                            onclick="confirmReservation(${t.id}, ${t.prix})"
                                            style="font-size: 1.2rem; min-height: 70px;">
                                        🚀 Réserver Maintenant
                                    </button>
                                </div>
                            </div>
                        </div>
                        </div>
                    </div>
                `;
                document.getElementById('detail-container').innerHTML = html;
            } catch (error) {
                document.getElementById('detail-container').innerHTML = '<div class="alert alert-danger text-center">Erreur: ' + error.message + '</div>';
            }
        }

        let selectedTripId = null;
        let selectedTripPrice = null;

        function confirmReservation(tId, price) {
            const user = JSON.parse(localStorage.getItem('ecoride_user'));
            if (!user) {
                alert("Vous devez être connecté pour réserver.");
                window.location.href = "connexion.html";
                return;
            }
            selectedTripId = tId;
            selectedTripPrice = price;
            document.getElementById('modal-price').textContent = price;
            const modal = new bootstrap.Modal(document.getElementById('reservationModal'));
            modal.show();
        }

        async function processReservation() {
            const user = JSON.parse(localStorage.getItem('ecoride_user'));
            try {
                const res = await apiCall('reservations.php?action=create', 'POST', {
                    trajet_id: selectedTripId,
                    passager_id: user.id,
                    prix: selectedTripPrice
                });
                alert(res.message);

                // Deduct credits locally so UI updates right away
                user.credits -= selectedTripPrice;
                localStorage.setItem('ecoride_user', JSON.stringify(user));

                window.location.href = `espace-perso.html`;
            } catch (e) {
                alert(e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadTripDetail);
    </script>
</body>

</html>
