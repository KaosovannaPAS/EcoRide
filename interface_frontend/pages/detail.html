<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Trajet - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body>

    <div id="header-container"></div>

    <main class="container my-5 flex-grow-1" id="detail-container">
        <div class="text-center py-5">
            <div class="spinner-border text-success"></div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        const urlParams = new URLSearchParams(window.location.search);
        let tripId = urlParams.get('id');

        async function loadTripDetail() {
            try {
                let trips = await apiCall(`trips.php?action=search`);
                let t = trips.find(tr => tr.id == tripId);

                if (!t) throw new Error("Trajet non trouvé");

                let ecoBadge = t.is_electric == 1 ? '<span class="eco-badge">🍃 Écologique</span>' : '';

                let html = `
                    <div class="card p-0 mx-auto rounded-4 border-0 shadow-sm overflow-hidden" style="max-width: 800px;">
                        <div style="height: 200px; background-image: url('../ressources/images/trip_detail_map_1772537269403.png'); background-size: cover; background-position: center; border-bottom: 1px solid rgba(0,0,0,0.05);"></div>
                        
                        <div class="p-5">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h2 class="mb-0 fw-bold text-dark">${t.departure_city} <span class="text-muted">➔</span> ${t.destination_city}</h2>
                                ${ecoBadge}
                            </div>
                        
                        <div class="row g-4 mb-5">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <div class="p-4 bg-white rounded-4 border h-100" style="background-color: var(--eco-bg) !important;">
                                    <h5 class="fw-bold text-primary mb-4" style="color: var(--eco-primary) !important;">Le Trajet</h5>
                                    <div class="d-flex mb-3">
                                        <div class="me-3 text-muted">📅</div>
                                        <div><strong>${t.departure_date}</strong> à <strong>${t.departure_time}</strong></div>
                                    </div>
                                    <div class="d-flex mb-3">
                                        <div class="me-3 text-muted">⏱️</div>
                                        <div>Durée estimée : <strong>${t.max_duration} min</strong></div>
                                    </div>
                                    <div class="d-flex">
                                        <div class="me-3 text-muted">👥</div>
                                        <div>Places restantes : <strong>${t.max_seats}</strong></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="p-4 bg-white rounded-4 border h-100" style="background-color: var(--eco-bg) !important;">
                                    <h5 class="fw-bold text-primary mb-4" style="color: var(--eco-primary) !important;">Le Chauffeur</h5>
                                    <div class="d-flex align-items-center mb-3">
                                        <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center me-3 fs-4" style="width: 48px; height: 48px;">
                                            ${t.driver_pseudo.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <div class="fw-bold fs-5">${t.driver_pseudo}</div>
                                            <div class="text-muted small">Membre vérifié</div>
                                        </div>
                                    </div>
                                    <div class="d-flex align-items-center border-top pt-3 mt-3">
                                        <div class="me-3 text-muted">🚗</div>
                                        <div class="fw-bold">${t.vehicle_model}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="p-4 rounded-4" style="background-color: #f0fdf4; border: 1px solid #bbf7d0;">
                            <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center">
                                <div>
                                    <div class="text-muted small mb-1">Prix par passager</div>
                                    <h2 class="mb-3 mb-sm-0 text-dark fw-bold">${t.price} <span class="fs-5 fw-normal text-muted">Crédits</span></h2>
                                </div>
                                <button class="btn btn-eco-accent btn-lg px-5 py-3 rounded-pill fw-bold" onclick="reserver(${t.id}, ${t.price})">Continuer</button>
                            </div>
                        </div>
                        </div>
                    </div>
                `;
                document.getElementById('detail-container').innerHTML = html;
            } catch (error) {
                document.getElementById('detail-container').innerHTML = '<div class="alert alert-danger text-center">Erreur: ' + error.message + '</div>';
            }
        }

        async function reserver(tId, price) {
            const user = JSON.parse(localStorage.getItem('ecoride_user'));
            if (!user) {
                alert("Vous devez être connecté pour réserver.");
                window.location.href = "connexion.html";
                return;
            }
            if (confirm(`Confirmez-vous la réservation avec un débit de ${price} crédits ?\n\nAppuyez sur OK pour valider (Double confirmation).`)) {
                try {
                    const res = await apiCall('reservations.php?action=create', 'POST', {
                        trip_id: tId,
                        passenger_id: user.id,
                        price: price
                    });
                    alert(res.message);
                    window.location.href = `espace-perso.html`;
                } catch (e) {
                    alert(e.message);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadTripDetail);
    </script>
</body>

</html>
