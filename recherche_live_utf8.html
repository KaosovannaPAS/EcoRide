<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de Trajets - EcoRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../ressources/css/style.css" rel="stylesheet">
</head>

<body>

    <div id="header-container"></div>

    <!-- Dynamic Hero Banner for Search Page -->
    <div class="search-hero position-relative mb-5"
        style="background-image: linear-gradient(rgba(5, 71, 82, 0.8), rgba(0, 204, 102, 0.6)), url('../ressources/images/hero_background_1772536897278.png'); background-size: cover; background-position: center; padding: 100px 0 80px 0; margin-top: -1px;">
        <div class="container position-relative z-index-1 text-white text-center">
            <h1 class="fw-bold display-4 mb-3 text-shadow">Votre prochain covoiturage</h1>
            <p class="lead fs-4 text-shadow-sm mb-0">Trouvez le trajet idéal parmi les conducteurs de notre communauté
                engagée.</p>
        </div>
        <!-- Decorative bottom wave (optional, using CSS clip-path or simple border) -->
        <div class="position-absolute bottom-0 w-100"
            style="height: 40px; background: linear-gradient(to top, var(--eco-bg) 0%, transparent 100%);"></div>
    </div>

    <!-- Main Content Area with Subtle Background -->
    <style>
        body {
            background-color: #f4fcf7;
            /* Very subtle green tint to remove pure white */
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
    </style>

    <main class="container mb-5 flex-grow-1">
        <div class="row g-4">
            <!-- Glassmorphic Filter Sidebar -->
            <div class="col-lg-3 col-md-4">
                <div class="card p-4 mb-4 sticky-top glass-panel rounded-4">
                    <h5 class="fw-bold mb-4" style="color: var(--eco-primary);">
                        <span class="fs-4 me-2">⚙️</span> Filtres
                    </h5>
                    <form id="filter-form">
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase tracking-wide">Prix max
                                (€/crédits)</label>
                            <input type="range" class="form-range" id="filter-price" min="0" max="100" value="100"
                                oninput="priceOutput.value = this.value">
                            <div class="d-flex justify-content-between text-success fw-bold mt-1">
                                <span>0</span>
                                <span><output id="priceOutput" class="fs-5">100</output></span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase tracking-wide">Durée max
                                (min)</label>
                            <input type="range" class="form-range" id="filter-duration" min="0" max="600" value="600"
                                step="30" oninput="durationOutput.value = this.value">
                            <div class="d-flex justify-content-between text-success fw-bold mt-1">
                                <span>0</span>
                                <span><output id="durationOutput" class="fs-5">600</output></span>
                            </div>
                        </div>
                        <div class="form-check mb-3 custom-checkbox">
                            <input class="form-check-input border-success" type="checkbox" id="filter-eco">
                            <label class="form-check-label text-success fw-bold" for="filter-eco">
                                <span class="fs-5 me-1">🍃</span> 100% Éco (<span class="eco-badge py-1 px-2">EV</span>)
                            </label>
                        </div>
                        <div class="form-check mb-4 custom-checkbox">
                            <input class="form-check-input border-warning" type="checkbox" id="filter-bonplan">
                            <label class="form-check-label text-warning fw-bold" for="filter-bonplan">
                                <span class="fs-5 me-1">🔥</span> Bon Plan
                            </label>
                        </div>
                        <button type="button" class="btn btn-eco w-100 py-3 rounded-pill shadow-sm"
                            onclick="applyFilters()">
                            Appliquer les filtres
                        </button>
                    </form>
                </div>
            </div>

            <!-- Results Area -->
            <div class="col-lg-9 col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                    <h4 class="fw-bold mb-0" style="color: var(--eco-primary);">Trajets disponibles</h4>
                    <span class="badge bg-eco-accent rounded-pill px-3 py-2 shadow-sm pulse-animation">🎁 Bonus : Gagnez
                        des crédits !</span>
                </div>
                <div id="results-container" class="row g-4">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../ressources/js/api.js"></script>
    <script>
        fetch('../composants/header.html').then(r => r.text()).then(d => {
            document.getElementById('header-container').innerHTML = d;
            const scripts = document.getElementById('header-container').querySelectorAll('script');
            scripts.forEach(script => {
                const newScript = document.createElement('script');
                newScript.text = script.innerHTML;
                document.body.appendChild(newScript);
            });
        });
        fetch('../composants/footer.html').then(r => r.text()).then(d => document.getElementById('footer-container').innerHTML = d);

        const urlParams = new URLSearchParams(window.location.search);
        let departure = urlParams.get('departure_city') || '';
        let destination = urlParams.get('destination_city') || '';
        let date = urlParams.get('departure_date') || '';
        let allTrips = [];

        async function loadTrips() {
            try {
                let query = `action=search&departure_city=${departure}&destination_city=${destination}&departure_date=${date}`;
                allTrips = await apiCall(`trips.php?${query}`);
                renderTrips(allTrips);
            } catch (error) {
                document.getElementById('results-container').innerHTML = '<div class="alert alert-danger">Impossible de charger les trajets.</div>';
            }
        }

        function renderTrips(trips) {
            const container = document.getElementById('results-container');
            if (trips.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-info text-center py-5">
                            <h4 class="fw-bold">Aucun trajet trouvé</h4>
                            <p class="mb-0">Désolé, nous n'avons trouvé aucun trajet correspondant à vos critères pour le moment.</p>
                            <a href="index.html" class="btn btn-outline-success rounded-pill mt-3">Retour à l'accueil</a>
                        </div>
                    </div>`;
                return;
            }

            let html = trips.map(t => {
                let ecoBadge = t.is_electric == 1 ? '<span class="badge bg-eco-accent rounded-pill fs-6 pulse-animation">🍃 ÉCOLOGIQUE</span>' : '';
                let isBonPlan = t.price <= 20;
                let dealBadge = isBonPlan ? '<div class="bon-plan-badge">🔥 BON PLAN</div>' : '';

                const oldPrice = Math.round(t.price * 1.5);
                const savings = oldPrice - t.price;

                return `
                    <div class="col-lg-6 col-md-12">
                        <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden bg-white bon-plan-card position-relative" onclick="window.location.href='detail.html?id=${t.id}'" style="cursor:pointer;">
                            ${dealBadge}
                            ${isBonPlan ? `<div class="savings-badge">-${savings} Crédits !</div>` : ''}
                            <div class="p-4 border-bottom" style="border-color: rgba(0,0,0,0.05) !important;">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="fw-bold fs-5 text-dark">${t.departure_time}</div>
                                    <div class="d-flex flex-column align-items-end">
                                        <span class="price-slashed">${oldPrice}</span>
                                        <div class="price-now">${t.price} <span class="fs-6 text-muted fw-normal">Crédits</span></div>
                                    </div>
                                </div>
                                <div class="position-relative ps-4" style="border-left: 2px dashed #00cc66; min-height: 60px;">
                                    <div class="position-absolute rounded-circle" style="width: 12px; height: 12px; border: 3px solid #00cc66; background: white; left: -7px; top: 0;"></div>
                                    <h5 class="fw-bold mb-4" style="color: var(--eco-primary);">${t.departure_city}</h5>
                                    
                                    <div class="position-absolute rounded-circle" style="width: 12px; height: 12px; border: 3px solid #00cc66; background: #00cc66; left: -7px; bottom: 0;"></div>
                                    <h5 class="fw-bold mb-0" style="color: var(--eco-primary);">${t.destination_city}</h5>
                                </div>
                            </div>
                            <div class="p-4 bg-light d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <div class="rounded-circle bg-white shadow-sm d-flex align-items-center justify-content-center me-2 text-success fw-bold" style="width: 32px; height: 32px; font-size: 0.8rem;">
                                        ${t.driver_pseudo ? t.driver_pseudo.charAt(0).toUpperCase() : '?'}
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark small">${t.driver_pseudo || 'Conducteur inconnu'}</div>
                                        <div class="text-muted" style="font-size: 0.7rem;">${t.vehicle_model || 'Modèle inconnu'}</div>
                                    </div>
                                </div>
                                ${ecoBadge}
                            </div>
                        </div>
                    </div>`;
            }).join('');
            container.innerHTML = html;
        }

        function applyFilters() {
            let maxPrice = document.getElementById('filter-price').value;
            let maxDuration = document.getElementById('filter-duration').value;
            let onlyEco = document.getElementById('filter-eco').checked;
            let bundleBonPlan = document.getElementById('filter-bonplan').checked;

            let filtered = allTrips.filter(t => {
                let match = true;
                if (parseFloat(t.price) > parseFloat(maxPrice)) match = false;
                if (parseFloat(t.max_duration) > parseFloat(maxDuration)) match = false;
                if (onlyEco && t.is_electric != 1) match = false;

                // Bon Plan logic: Strictly price <= 20 as requested
                if (bundleBonPlan && t.price > 20) match = false;

                return match;
            });
            renderTrips(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadTrips);
    </script>
</body>

</html>
