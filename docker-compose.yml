version: '3.8'

services:
  web:
    build: .
    # Note: Port 80 is internal. Exposed via the gateway on port 80.
    volumes:
      - .:/var/www/html
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=ecoride
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MONGO_HOST=mongo
    depends_on:
      - db
      - mongo

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecoride
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./noyau_backend/configuration/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  mongo:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      - PMA_HOST=db
      - PMA_USER=user
      - PMA_PASSWORD=password
      - PMA_ABSOLUTE_URI=http://localhost/phpmyadmin/
    depends_on:
      - db

  gateway:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - phpmyadmin

volumes:
  db_data:
  mongo_data:
